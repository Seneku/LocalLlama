name: Release

# Cross-compile the standalone binaries for Windows, Linux and macOS from a
# single Linux runner (Bun cross-compiles all targets) and publish a GitHub
# Release whenever a version tag (v*) is pushed:
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*"
  # Manual runs build + test the executables on CI without publishing a release
  # (the release steps below are guarded to tag pushes).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Compile standalone binaries (win / linux / macOS)
        run: bun run package:all

      - name: Name the artifacts for this tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp dist/LocalLlama-win-x64.exe "dist/LocalLlama-${GITHUB_REF_NAME}-win-x64.exe"
          cp dist/LocalLlama-linux-x64 "dist/LocalLlama-${GITHUB_REF_NAME}-linux-x64"
          cp dist/LocalLlama-macos-arm64 "dist/LocalLlama-${GITHUB_REF_NAME}-macos-arm64"
          cp dist/LocalLlama-macos-x64 "dist/LocalLlama-${GITHUB_REF_NAME}-macos-x64"

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat > notes.md <<'EOF'
          Self-contained executables — no install, no Bun, no dependencies. Run it and it starts the server and opens the app in your browser.

          | Platform | Download |
          | --- | --- |
          | Windows x64 | `LocalLlama-*-win-x64.exe` |
          | Linux x64 | `LocalLlama-*-linux-x64` |
          | macOS (Apple Silicon) | `LocalLlama-*-macos-arm64` |
          | macOS (Intel) | `LocalLlama-*-macos-x64` |

          You need a local llama.cpp build with `llama-server` / `llama-bench` (`.exe` on Windows); point LocalLlama at it from the **Settings** screen on first run.

          **First-run notes (the binaries are unsigned):**
          - **Windows** — SmartScreen shows *"Windows protected your PC"*: click **More info → Run anyway**.
          - **macOS** — Gatekeeper blocks unsigned apps. Run `xattr -d com.apple.quarantine ./LocalLlama-*-macos-*` (or right-click → **Open**), then `chmod +x` it.
          - **Linux** — `chmod +x ./LocalLlama-*-linux-x64`, then run it.

          > GPU/VRAM detection uses `nvidia-smi` on Windows & Linux (NVIDIA), and models Apple Silicon's Metal GPU as unified memory on macOS (approximate). Intel Macs fall back to CPU. Build from source with `bun run package:all`.
          EOF

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/LocalLlama-${GITHUB_REF_NAME}-win-x64.exe" \
            "dist/LocalLlama-${GITHUB_REF_NAME}-linux-x64" \
            "dist/LocalLlama-${GITHUB_REF_NAME}-macos-arm64" \
            "dist/LocalLlama-${GITHUB_REF_NAME}-macos-x64" \
            --title "LocalLlama ${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            --verify-tag
