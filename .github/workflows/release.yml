name: Release

# Build LocalLlama.exe on a Windows runner and publish a GitHub Release
# whenever a version tag (v*) is pushed:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"
  # Manual runs build + test the executable on CI without publishing a release
  # (the release steps below are guarded to tag pushes).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check and test
        run: bun test

      - name: Build standalone executable
        run: bun run package

      - name: Name the artifact for this tag
        if: startsWith(github.ref, 'refs/tags/')
        run: cp dist/LocalLlama.exe "dist/LocalLlama-${GITHUB_REF_NAME}-win-x64.exe"

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat > notes.md <<'EOF'
          A single self-contained Windows x64 executable — no install, no Bun, no dependencies. Double-click it and it starts the server and opens the app in your browser.

          You need a local llama.cpp build with `llama-server.exe` / `llama-bench.exe`; point LocalLlama at it from the **Settings** screen on first run.

          > ⚠️ **The executable is unsigned.** Windows SmartScreen will show *"Windows protected your PC"* the first time you run it — expected for any unsigned app. Click **More info → Run anyway**, or build it yourself from source with `bun run package`.
          EOF

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/LocalLlama-${GITHUB_REF_NAME}-win-x64.exe" \
            --title "LocalLlama ${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            --verify-tag
